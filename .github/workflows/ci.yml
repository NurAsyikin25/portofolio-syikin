name: CI - Validasi Kode

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Validasi struktur HTML
        run: |
          if [ ! -f index.html ]; then
            echo "index.html tidak ditemukan!"
            exit 1
          fi
          echo "File index.html ditemukan, lanjut."
